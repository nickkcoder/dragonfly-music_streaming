<section class="liked-page" aria-labelledby="liked-title">

  <!-- Skeleton -->
  <div class="liked-hero skeleton-hero" *ngIf="loading" aria-hidden="true">
    <div class="hero-overlay">
      <div class="skeleton-pill"></div>
      <div class="skeleton-h1"></div>
      <div class="skeleton-sub"></div>
    </div>
  </div>

  <!-- Error -->
  <div class="liked-error" *ngIf="!loading && error" role="alert">
    <p>{{ error }}</p>
    <button type="button" class="back-btn" (click)="goBack()">← Go Back</button>
  </div>

  <!-- Hero Banner -->
  <header class="liked-hero" *ngIf="!loading && !error">
    <div class="hero-overlay">
      <button type="button" class="back-btn" (click)="goBack()" aria-label="Back to Profile">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        Profile
      </button>

      <div class="hero-meta">
        <div class="id-pill">
          <!-- Heart SVG -->
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
            fill="currentColor" aria-hidden="true" style="margin-right:6px">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
          LIKED SONGS
        </div>
        <h1 id="liked-title">Liked Songs</h1>
        <p class="hero-sub">{{ tracks.length }} song{{ tracks.length !== 1 ? 's' : '' }}</p>
      </div>

      <button
        type="button"
        class="play-all-btn"
        (click)="playAll()"
        [disabled]="!tracks.length"
        aria-label="Play all liked songs"
      >
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20" aria-hidden="true">
          <polygon points="5 3 19 12 5 21 5 3"></polygon>
        </svg>
        Play All
      </button>
    </div>
  </header>

  <!-- Track List -->
  <section class="track-list-section" *ngIf="!loading && !error" aria-label="Liked songs list">
    <div class="track-list" role="list">
      <div
        class="track-row"
        *ngFor="let track of tracks"
        role="listitem"
        tabindex="0"
        (click)="playTrack(track)"
        (keydown.enter)="playTrack(track)"
        (keydown.space)="$event.preventDefault(); playTrack(track)"
        [attr.aria-label]="'Play ' + track.title + ' by ' + track.artistName"
      >
        <span class="track-num" aria-hidden="true">{{ track.position }}</span>

        <img
          class="track-cover"
          [src]="track.coverImage"
          [alt]="track.title + ' artwork'"
          loading="lazy"
        />

        <div class="track-meta">
          <h3 class="track-title">{{ track.title }}</h3>
          <p class="track-artist" *ngIf="track.artistName">{{ track.artistName }}</p>
        </div>

        <span class="track-duration" *ngIf="track.duration">{{ track.duration }}</span>

        <div class="track-actions">
          <button type="button" (click)="playNext(track, $event)" [attr.aria-label]="'Play ' + track.title + ' next'">Next</button>
          <button type="button" (click)="addToQueue(track, $event)" [attr.aria-label]="'Queue ' + track.title">Queue</button>
        </div>
      </div>

      <div class="empty-state" *ngIf="!tracks.length" role="status">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.3" aria-hidden="true">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
        <p>No liked songs yet. Tap the heart icon in the player to save tracks here.</p>
      </div>
    </div>
  </section>

</section>
