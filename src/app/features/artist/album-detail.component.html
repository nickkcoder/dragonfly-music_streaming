<section class="album-detail-page" aria-labelledby="album-title">

  <!-- Loading skeleton -->
  <div class="album-hero skeleton-hero" *ngIf="loading" aria-hidden="true">
    <div class="hero-overlay">
      <div class="skeleton-pill"></div>
      <div class="skeleton-h1"></div>
      <div class="skeleton-sub"></div>
    </div>
  </div>

  <!-- Error -->
  <div class="album-error" *ngIf="!loading && error" role="alert">
    <p>{{ error }}</p>
    <button type="button" class="back-btn" (click)="goBack()">← Go Back</button>
  </div>

  <!-- Hero Banner -->
  <header
    class="album-hero"
    *ngIf="!loading && album"
    [style.background-image]="bannerStyle"
    [style.background-size]="'cover'"
    [style.background-position]="'center'"
  >
    <div class="hero-overlay">
      <button type="button" class="back-btn" (click)="goBack()" aria-label="Go back">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        Back
      </button>

      <div class="hero-meta">
        <div class="id-pill" aria-label="Album ID">ALBUM · {{ album.id }}</div>
        <h1 id="album-title">{{ album.title }}</h1>
        <p class="hero-sub">
          <span *ngIf="album.artistName">
            <a [routerLink]="['/artist', album.artistId]" class="artist-link">{{ album.artistName }}</a>
            &nbsp;·&nbsp;
          </span>
          <span *ngIf="album.releaseDate">{{ album.releaseDate | date:'yyyy' }} &nbsp;·&nbsp;</span>
          <span>{{ album.tracks.length }} track{{ album.tracks.length !== 1 ? 's' : '' }}</span>
        </p>
      </div>

      <button
        type="button"
        class="play-all-btn"
        (click)="playAll()"
        [disabled]="!album.tracks.length"
        aria-label="Play all tracks in this album"
      >
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20" aria-hidden="true">
          <polygon points="5 3 19 12 5 21 5 3"></polygon>
        </svg>
        Play All
      </button>
    </div>
  </header>

  <!-- Track List -->
  <section class="track-list-section" *ngIf="!loading && album" aria-label="Album tracks">
    <div class="track-list" role="list">
      <div
        class="track-row"
        *ngFor="let track of album.tracks"
        role="listitem"
        tabindex="0"
        (click)="playTrack(track)"
        (keydown.enter)="playTrack(track)"
        (keydown.space)="$event.preventDefault(); playTrack(track)"
        [attr.aria-label]="'Track ' + track.trackNumber + ': ' + track.title"
      >
        <span class="track-num" aria-hidden="true">{{ track.trackNumber }}</span>

        <img
          class="track-cover"
          [src]="track.coverImage || album.coverImage || 'assets/default-cover.png'"
          [alt]="track.title + ' artwork'"
          loading="lazy"
        />

        <div class="track-meta">
          <h3 class="track-title">{{ track.title }}</h3>
        </div>

        <span class="track-duration" *ngIf="track.duration">{{ track.duration }}</span>

        <div class="track-actions">
          <button
            type="button"
            (click)="playNext(track, $event)"
            [attr.aria-label]="'Play ' + track.title + ' next'"
          >Next</button>
          <button
            type="button"
            (click)="addToQueue(track, $event)"
            [attr.aria-label]="'Add ' + track.title + ' to queue'"
          >Queue</button>
        </div>
      </div>

      <p class="empty-state" *ngIf="!album.tracks.length" role="status">
        This album has no tracks yet.
      </p>
    </div>
  </section>

</section>
