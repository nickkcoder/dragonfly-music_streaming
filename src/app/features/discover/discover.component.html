<section class="discover-hero">
  <h1>Discover</h1>
  <p>Live artists and songs from the archive.</p>
  <div class="discover-search-wrap">
    <input
      type="text"
      class="discover-search"
      placeholder="Search artists or songs..."
      [(ngModel)]="searchTerm">
  </div>
  <div class="discover-controls">
    <select [(ngModel)]="sectionFilter">
      <option value="all">All</option>
      <option value="artists">Artists only</option>
      <option value="songs">Songs only</option>
    </select>
    <select [(ngModel)]="artistGenreFilter">
      <option value="all">All artist genres</option>
      <option *ngFor="let genre of artistGenreOptions" [value]="genre.toLowerCase()">{{ genre }}</option>
    </select>
    <select [(ngModel)]="songGenreFilter">
      <option value="all">All song genres</option>
      <option *ngFor="let genre of songGenreOptions" [value]="genre.toLowerCase()">{{ genre }}</option>
    </select>
  </div>
</section>

<section class="discover-content">
  <p class="status loading" *ngIf="loading">Loading discover data...</p>
  <p class="status error" *ngIf="error">{{ error }}</p>

  <div class="content-grid" *ngIf="!loading && !error">
    <article class="panel" *ngIf="showArtistsSection">
      <div class="panel-head">
        <h2>Artists</h2>
        <span>{{ filteredArtists.length }}</span>
      </div>

      <div class="artist-grid">
        <a class="artist-card" *ngFor="let artist of filteredArtists" [routerLink]="['/artist', artist.id]">
          <img [src]="artist.image" [alt]="artist.name">
          <div class="artist-meta">
            <h3>{{ artist.name }}</h3>
            <p>{{ artist.genre }}</p>
          </div>
        </a>
      </div>

      <p class="empty" *ngIf="!filteredArtists.length">No artists found.</p>
    </article>

    <article class="panel" *ngIf="showSongsSection">
      <div class="panel-head">
        <h2>Songs</h2>
        <span>{{ filteredSongs.length }}</span>
      </div>

      <div class="song-list">
        <div class="song-row song-row-clickable" *ngFor="let song of filteredSongs" (click)="playSong(song)">
          <div class="song-main">
            <img class="song-mini-cover" [src]="song.coverImage" [alt]="song.title">
            <div>
            <h3>{{ song.title }}</h3>
            <p>{{ song.artistName }}</p>
            </div>
          </div>
          <div class="song-right">
            <span>{{ song.genre }}</span>
            <div class="song-actions">
              <button type="button" (click)="playNext(song, $event)">Play next</button>
              <button type="button" (click)="addToQueue(song, $event)">Add to queue</button>
            </div>
          </div>
        </div>
      </div>

      <p class="empty" *ngIf="!filteredSongs.length">No songs found.</p>
    </article>
  </div>
</section>
