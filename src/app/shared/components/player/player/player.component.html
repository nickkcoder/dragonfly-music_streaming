<div
  class="playerbar"
  [class.playing]="isPlaying"
  [class.expanded]="isExpanded"
  role="region"
  aria-label="Music player"
  (click)="!isExpanded && toggleExpanded()"
>
  <button
    *ngIf="isExpanded"
    class="collapse-toggle"
    (click)="toggleExpanded(); $event.stopPropagation()"
    type="button"
    aria-label="Close expanded player"
  >
    <span aria-hidden="true">✕</span>
  </button>

  <div class="royal-glow"></div>
  <div class="gold-frame"></div>
  <div class="energy-trim"></div>

  <div class="compact-layout" *ngIf="!isExpanded">

    <!-- LEFT: album art + track meta -->
    <div class="track-info">
      <div
        class="art-stack"
        role="button"
        tabindex="0"
        [attr.aria-label]="'Expand player for ' + currentTrack.title"
        (click)="toggleExpanded(); $event.stopPropagation()"
        (keydown.enter)="toggleExpanded(); $event.stopPropagation()"
        (keydown.space)="$event.preventDefault(); toggleExpanded(); $event.stopPropagation()"
      >
        <img
          class="track-cover"
          [src]="currentTrack.coverImage || 'assets/favicon.ico'"
          [alt]="currentTrack.title + ' album art'"
        >
      </div>

      <div class="meta">
        <h4 class="track-title">{{ currentTrack.title }}</h4>
        <p class="track-artist">{{ currentTrack.artist }}</p>
      </div>
    </div>

    <!-- CENTER: shuffle | prev | time waveform time | next | repeat -->
    <div class="player-center" (click)="$event.stopPropagation()">

      <!-- Shuffle -->
      <button
        class="icon-btn"
        type="button"
        [class.icon-btn--active]="isShuffled"
        (click)="toggleShuffle(); $event.stopPropagation()"
        [attr.aria-label]="isShuffled ? 'Shuffle on' : 'Shuffle off'"
        [attr.aria-pressed]="isShuffled"
      >
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="16 3 21 3 21 8"></polyline>
          <line x1="4" y1="20" x2="21" y2="3"></line>
          <polyline points="21 16 21 21 16 21"></polyline>
          <line x1="15" y1="15" x2="21" y2="21"></line>
        </svg>
      </button>

      <!-- Prev -->
      <button
        class="icon-btn"
        type="button"
        (click)="prev(); $event.stopPropagation()"
        aria-label="Previous track"
      >
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polygon points="19 20 9 12 19 4 19 20"></polygon>
          <line x1="5" y1="4" x2="5" y2="20"></line>
        </svg>
      </button>

      <!-- Time -->
      <span class="time" [attr.aria-label]="'Current time ' + currentTime">{{ currentTime }}</span>

      <!-- Waveform -->
      <div
        class="waveform-wrapper"
        role="slider"
        aria-label="Seek"
        aria-valuemin="0"
        aria-valuemax="100"
        [attr.aria-valuenow]="progress | number:'1.0-0'"
        [attr.aria-valuetext]="currentTime + ' of ' + duration"
        tabindex="0"
        (click)="seek($event)"
        (keydown.arrowRight)="audio.currentTime = audio.currentTime + 5"
        (keydown.arrowLeft)="audio.currentTime = audio.currentTime - 5"
      >
        <div class="waveform" [class.playing]="isPlaying">
          <div
            *ngFor="let bar of waveformBars; let i = index"
            class="waveform-bar"
            [class.played]="(i / WAVEFORM_BARS) * 100 <= progress"
            [style.height.%]="bar * 100"
          ></div>
        </div>
      </div>

      <!-- Time -->
      <span class="time" [attr.aria-label]="'Total duration ' + duration">{{ duration }}</span>

      <!-- Next -->
      <button
        class="icon-btn"
        type="button"
        (click)="next(); $event.stopPropagation()"
        aria-label="Next track"
      >
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polygon points="5 4 15 12 5 20 5 4"></polygon>
          <line x1="19" y1="4" x2="19" y2="20"></line>
        </svg>
      </button>

      <!-- Repeat -->
      <button
        class="icon-btn"
        type="button"
        [class.icon-btn--active]="isRepeating"
        (click)="toggleRepeat(); $event.stopPropagation()"
        [attr.aria-label]="isRepeating ? 'Repeat on' : 'Repeat off'"
        [attr.aria-pressed]="isRepeating"
      >
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="17 1 21 5 17 9"></polyline>
          <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
          <polyline points="7 23 3 19 7 15"></polyline>
          <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
        </svg>
      </button>

    </div>

    <!-- RIGHT: big play + like -->
    <div class="player-right" (click)="$event.stopPropagation()">
      <div class="play-wrapper">
        <div class="play-aura" aria-hidden="true"></div>
        <button
          class="play-btn"
          type="button"
          (click)="togglePlay(); $event.stopPropagation()"
          (mousemove)="magnetic($event)"
          (mouseleave)="resetMagnetic($event)"
          [attr.aria-label]="(isPlaying ? 'Pause' : 'Play') + ' ' + currentTrack.title"
          [attr.aria-pressed]="isPlaying"
        >
          <!-- Play icon -->
          <svg *ngIf="!isPlaying" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" width="20" height="20">
            <path d="M8 5v14l11-7z"/>
          </svg>
          <!-- Pause icon -->
          <svg *ngIf="isPlaying" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" width="20" height="20">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
          </svg>
        </button>
      </div>

      <button
        class="like-btn"
        type="button"
        [class.active]="isCurrentTrackLiked"
        [disabled]="!currentTrack.songId || likeBusy"
        (click)="toggleLikeCurrentTrack($event)"
        [attr.aria-label]="(isCurrentTrackLiked ? 'Unlike' : 'Like') + ' ' + currentTrack.title"
        [attr.aria-pressed]="isCurrentTrackLiked"
      >
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true" width="16" height="16"
          [attr.fill]="isCurrentTrackLiked ? 'currentColor' : 'none'"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </button>
    </div>

  </div>

  <div class="expanded-layout" [class.sidebar-collapsed]="!isSidebarOpen" *ngIf="isExpanded" (click)="$event.stopPropagation()">
    <button
      class="sidebar-toggle-open"
      *ngIf="!isSidebarOpen"
      (click)="isSidebarOpen = true"
      type="button"
      aria-label="Open queue sidebar"
    >
      <span aria-hidden="true">☰</span>
    </button>

    <aside class="expanded-sidebar" *ngIf="isSidebarOpen" aria-label="Library sidebar">
      <div class="sidebar-head">
        <span>Library</span>
        <button
          class="sidebar-close"
          type="button"
          (click)="isSidebarOpen = false"
          aria-label="Close library sidebar"
        >
          <span aria-hidden="true">✕</span>
        </button>
      </div>

      <div class="expanded-tabs" role="tablist" aria-label="Library sections">
        <button
          class="expanded-tab"
          role="tab"
          [attr.aria-selected]="activeExpandedTab === 'recent'"
          [class.active]="activeExpandedTab === 'recent'"
          (click)="selectExpandedTab('recent')"
          type="button"
        >
          Recently Played
        </button>

        <button
          class="expanded-tab"
          role="tab"
          [attr.aria-selected]="activeExpandedTab === 'queue'"
          [class.active]="activeExpandedTab === 'queue'"
          (click)="selectExpandedTab('queue')"
          type="button"
        >
          Queue
        </button>
      </div>

      <div class="expanded-sidebar-content" *ngIf="activeExpandedTab; else tabPrompt" role="tabpanel">
        <ul *ngIf="activeExpandedTab === 'recent'" aria-label="Recently played tracks">
          <li *ngFor="let item of recentlyPlayed">
            <button type="button" class="track-list-btn" (click)="playRecentItem(item, $event)">
              <img class="mini-cover" [src]="item.coverImage || currentTrack.coverImage || 'assets/favicon.ico'" [alt]="item.title + ' album art'">
              <span>{{ item.title }} - {{ item.artist }}</span>
            </button>
          </li>
          <li *ngIf="!recentlyPlayed.length">No recent tracks yet.</li>
        </ul>

        <ul *ngIf="activeExpandedTab === 'queue'" aria-label="Playback queue">
          <li *ngFor="let item of queue; let i = index" class="queue-row">
            <img class="mini-cover" [src]="item.coverImage || currentTrack.coverImage || 'assets/favicon.ico'" [alt]="item.title + ' album art'">
            <span>{{ item.title }} - {{ item.artist }}</span>
            <div class="queue-actions">
              <button type="button" (click)="playQueuedItem(i, $event)" [attr.aria-label]="'Play ' + item.title">Play</button>
              <button type="button" (click)="moveQueueItemUp(i, $event)" [disabled]="i === 0" [attr.aria-label]="'Move ' + item.title + ' up in queue'">↑</button>
              <button type="button" (click)="moveQueueItemDown(i, $event)" [disabled]="i === queue.length - 1" [attr.aria-label]="'Move ' + item.title + ' down in queue'">↓</button>
              <button type="button" (click)="removeQueueItem(i, $event)" [attr.aria-label]="'Remove ' + item.title + ' from queue'">×</button>
            </div>
          </li>
          <li *ngIf="!queue.length">Queue is empty.</li>
        </ul>
      </div>

      <ng-template #tabPrompt>
        <p class="tab-placeholder">Choose a tab to view list.</p>
      </ng-template>
    </aside>

    <section class="expanded-main" aria-label="Now playing">
      <img
        class="expanded-cover"
        [src]="currentTrack.coverImage || 'assets/favicon.ico'"
        [alt]="currentTrack.title + ' album art'"
      >

      <div class="expanded-meta">
        <h3>{{ currentTrack.title }}</h3>
        <p>{{ currentTrack.artist }}</p>
        <button
          class="like-btn expanded-like-btn"
          type="button"
          [class.active]="isCurrentTrackLiked"
          [disabled]="!currentTrack.songId || likeBusy"
          (click)="toggleLikeCurrentTrack($event)"
          [attr.aria-label]="(isCurrentTrackLiked ? 'Unlike' : 'Like') + ' ' + currentTrack.title"
          [attr.aria-pressed]="isCurrentTrackLiked"
        >
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true" width="18" height="18"
            [attr.fill]="isCurrentTrackLiked ? 'currentColor' : 'none'"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </button>
      </div>

      <!-- Full 5-button control row matching the reference -->
      <div class="expanded-controls">

        <!-- Shuffle -->
        <button
          class="icon-btn"
          type="button"
          [class.icon-btn--active]="isShuffled"
          (click)="toggleShuffle()"
          [attr.aria-label]="isShuffled ? 'Shuffle on' : 'Shuffle off'"
          [attr.aria-pressed]="isShuffled"
        >
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="16 3 21 3 21 8"></polyline>
            <line x1="4" y1="20" x2="21" y2="3"></line>
            <polyline points="21 16 21 21 16 21"></polyline>
            <line x1="15" y1="15" x2="21" y2="21"></line>
          </svg>
        </button>

        <!-- Skip prev -->
        <button
          class="icon-btn icon-btn--lg"
          type="button"
          (click)="prev()"
          aria-label="Previous track"
        >
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polygon points="19 20 9 12 19 4 19 20"></polygon>
            <line x1="5" y1="4" x2="5" y2="20"></line>
          </svg>
        </button>

        <!-- Play / Pause -->
        <div class="play-wrapper">
          <div class="play-aura" aria-hidden="true"></div>
          <button
            class="play-btn play-btn--lg"
            type="button"
            (click)="togglePlay()"
            (mousemove)="magnetic($event)"
            (mouseleave)="resetMagnetic($event)"
            [attr.aria-label]="(isPlaying ? 'Pause' : 'Play') + ' ' + currentTrack.title"
            [attr.aria-pressed]="isPlaying"
          >
            <svg *ngIf="!isPlaying" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" width="26" height="26">
              <path d="M8 5v14l11-7z"/>
            </svg>
            <svg *ngIf="isPlaying" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" width="26" height="26">
              <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
            </svg>
          </button>
        </div>

        <!-- Skip next -->
        <button
          class="icon-btn icon-btn--lg"
          type="button"
          (click)="next()"
          aria-label="Next track"
        >
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polygon points="5 4 15 12 5 20 5 4"></polygon>
            <line x1="19" y1="4" x2="19" y2="20"></line>
          </svg>
        </button>

        <!-- Repeat -->
        <button
          class="icon-btn"
          type="button"
          [class.icon-btn--active]="isRepeating"
          (click)="toggleRepeat()"
          [attr.aria-label]="isRepeating ? 'Repeat on' : 'Repeat off'"
          [attr.aria-pressed]="isRepeating"
        >
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="17 1 21 5 17 9"></polyline>
            <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
            <polyline points="7 23 3 19 7 15"></polyline>
            <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
          </svg>
        </button>

      </div>

      <div class="progress-section expanded-progress">
        <span class="time" [attr.aria-label]="'Current time ' + currentTime">{{ currentTime }}</span>

        <div
          class="waveform-wrapper"
          role="slider"
          aria-label="Seek"
          aria-valuemin="0"
          aria-valuemax="100"
          [attr.aria-valuenow]="progress | number:'1.0-0'"
          [attr.aria-valuetext]="currentTime + ' of ' + duration"
          tabindex="0"
          (click)="seek($event)"
          (keydown.arrowRight)="audio.currentTime = audio.currentTime + 5"
          (keydown.arrowLeft)="audio.currentTime = audio.currentTime - 5"
        >
          <div class="waveform" [class.playing]="isPlaying">
            <div
              *ngFor="let bar of waveformBars; let i = index"
              class="waveform-bar"
              [class.played]="(i / WAVEFORM_BARS) * 100 <= progress"
              [style.height.%]="bar * 100"
            ></div>
          </div>
        </div>

        <span class="time" [attr.aria-label]="'Total duration ' + duration">{{ duration }}</span>
      </div>
    </section>
  </div>
</div>
